version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Installing Terraform..."
      - wget -q https://releases.hashicorp.com/terraform/1.14.7/terraform_1.14.7_linux_amd64.zip
      - unzip -q terraform_1.14.7_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform --version
      - chmod +x format_terraform_plan.py

  pre_build:
    commands:
      - echo "Running Terraform plan..."
      - terraform init
      - |
        echo "Running terraform plan..."
        if ! terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt; then
          echo "❌ Terraform plan failed!"
          exit 1
        fi

        if [ ! -f "tfplan" ]; then
          echo "❌ tfplan file was not created!"
          exit 1
        fi

        echo "✅ Terraform plan completed successfully"

      - echo "📋 Formatting plan..."
      - python3 format_terraform_plan.py plan_output.txt | tee formatted_plan.txt

  build:
    commands:
      - echo "🚀 APPLYING TERRAFORM CHANGES"

      # ✅ HEARTBEAT to prevent timeout
      - |
        ( while true; do
            echo "⏳ Build still running... $(date)"
            sleep 60
          done ) &
        HEARTBEAT_PID=$!

      # ✅ FIXED: No pipe-to-while (prevents buffering issue)
      - terraform apply -auto-approve tfplan -no-color | tee apply_output.txt
      - APPLY_EXIT_CODE=${PIPESTATUS[0]}

      # ✅ Stop heartbeat
      - kill $HEARTBEAT_PID

      - echo "Terraform apply exit code: $APPLY_EXIT_CODE"

      # ✅ Error handling
      - |
        if grep -q "Error:" apply_output.txt; then
          echo "❌ Terraform apply failed - errors detected!"
          exit 1
        fi

        if [ $APPLY_EXIT_CODE -ne 0 ]; then
          echo "❌ Terraform apply failed!"
          exit $APPLY_EXIT_CODE
        fi

      - echo "✅ DEPLOYMENT COMPLETE!"

  post_build:
    commands:
      - echo "🔄 Creating Pull Request..."

      - |
        if [ "${APPLY_EXIT_CODE:-1}" -eq 0 ]; then
          echo "✅ Apply successful, creating PR..."

          export GITHUB_TOKEN=$(aws ssm get-parameter \
            --name "/codepipeline/github-token" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region us-east-1 2>/dev/null)

          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠️ No GitHub token found, skipping PR"
            exit 0
          fi

          GITHUB_OWNER="DogiparthiAasrith"
          GITHUB_REPO="codepipeline"
          TARGET_BRANCH="main"

          SOURCE_BRANCH="${CODEBUILD_SOURCE_VERSION#refs/heads/}"

          if [ "$SOURCE_BRANCH" != "$TARGET_BRANCH" ]; then
            echo "Creating PR..."

            curl -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/$GITHUB_OWNER/$GITHUB_REPO/pulls \
              -d "{
                \"title\": \"Terraform Auto PR\",
                \"head\": \"$SOURCE_BRANCH\",
                \"base\": \"$TARGET_BRANCH\"
              }"

            echo "✅ PR Created"
          else
            echo "Skipping PR (already on main)"
          fi
        else
          echo "❌ Apply failed, skipping PR"
        fi

artifacts:
  files:
    - '**/*'