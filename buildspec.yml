version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Installing Terraform..."
      - wget -q https://releases.hashicorp.com/terraform/1.14.7/terraform_1.14.7_linux_amd64.zip
      - unzip -q terraform_1.14.7_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform --version
      - chmod +x format_terraform_plan.py
  pre_build:
    commands:
      - echo "Running Terraform plan..."
      - terraform init
      - terraform plan -out=tfplan -no-color | tee plan_output.txt
      - echo ""
      - echo "=========================================="
      - echo "📋 TERRAFORM PLAN - HUMAN READABLE FORMAT"
      - echo "=========================================="
      - python3 format_terraform_plan.py plan_output.txt | tee formatted_plan.txt
      - echo ""
      - echo "=========================================="
      - echo "✅ Plan review complete. Proceeding to apply..."
      - echo "=========================================="
  build:
    commands:
      - echo ""
      - echo "=========================================="
      - echo "🚀 APPLYING TERRAFORM CHANGES"
      - echo "=========================================="
      - echo ""
      - echo "📋 Reminder - Changes being applied:"
      - python3 format_terraform_plan.py plan_output.txt
      - echo ""
      - echo "⏳ Executing terraform apply..."
      - terraform apply -auto-approve tfplan -no-color | tee apply_output.txt
      - echo ""
      - echo "=========================================="
      - echo "✅ DEPLOYMENT COMPLETE!"
      - echo "=========================================="
  post_build:
    commands:
      - echo ""
      - echo "=========================================="
      - echo "🔄 CREATING PULL REQUEST TO MAIN"
      - echo "=========================================="
      - |
        # Get GitHub token from Parameter Store
        export GITHUB_TOKEN=$(aws ssm get-parameter --name "/codepipeline/github-token" --with-decryption --query "Parameter.Value" --output text --region us-east-1)
        
        # Set GitHub repo details
        GITHUB_OWNER="DogiparthiAasrith"
        GITHUB_REPO="codepipeline"
        TARGET_BRANCH="main"
        
        # Detect source branch - try multiple methods
        if [ -n "$BRANCH_NAME" ]; then
          # Environment variable passed from CodePipeline
          SOURCE_BRANCH="$BRANCH_NAME"
        elif [ -n "$CODEBUILD_WEBHOOK_HEAD_REF" ]; then
          # Webhook trigger (direct CodeBuild)
          SOURCE_BRANCH="${CODEBUILD_WEBHOOK_HEAD_REF#refs/heads/}"
        else
          # Fallback: get current git branch
          cd $CODEBUILD_SRC_DIR
          SOURCE_BRANCH=$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
        fi
        
        echo "Detected source branch: $SOURCE_BRANCH"
        
        # Only create PR if not already on main branch
        if [ "$SOURCE_BRANCH" != "$TARGET_BRANCH" ] && [ "$SOURCE_BRANCH" != "HEAD" ]; then
          echo "Creating PR from $SOURCE_BRANCH to $TARGET_BRANCH..."
          
          # Escape special characters in JSON
          APPLY_OUTPUT=$(cat apply_output.txt | tail -20 | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          # Create PR using GitHub API
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$GITHUB_OWNER/$GITHUB_REPO/pulls \
            -d "{\"title\":\"[Terraform] Merge $SOURCE_BRANCH to main\",\"body\":\"## Terraform Apply Successful ✅\\n\\nThis PR was automatically created after successful Terraform apply.\\n\\n### Resources Applied:\\n\\\`\\\`\\\`\\n${APPLY_OUTPUT}\\n\\\`\\\`\\\`\\n\\n**Pipeline:** $CODEBUILD_BUILD_ID\\n**Branch:** $SOURCE_BRANCH\",\"head\":\"$SOURCE_BRANCH\",\"base\":\"$TARGET_BRANCH\"}")
          
          PR_URL=$(echo $PR_RESPONSE | grep -o '"html_url": "[^"]*' | cut -d'"' -f4 | head -1)
          
          if [ -n "$PR_URL" ]; then
            echo "✅ Pull Request created: $PR_URL"
          else
            echo "⚠️  PR may already exist or error occurred"
            echo "Response: $PR_RESPONSE"
          fi
        else
          echo "Already on main branch or detached HEAD, skipping PR creation"
        fi

artifacts:
  files:
    - '**/*'
